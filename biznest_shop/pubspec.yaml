name: biznest_shop
description: "BizNest Shop - Customer app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  biznest_core:
    path: ../biznest_core
  supabase_flutter: ^2.8.4
  dio: ^5.7.0
  flutter_bloc: ^9.1.1
  go_router: ^15.1.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shared_preferences: ^2.3.5
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  image_picker: ^1.1.2
  equatable: ^2.0.7
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo.png
